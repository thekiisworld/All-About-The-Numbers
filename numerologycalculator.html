<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Root Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: #333; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3>Sum of Digits</h3>
    <p>Enter a number to find its single-digit sum (1-9):</p>
    <input type="number" id="numInput" placeholder="e.g. 239">
    <button onclick="calculateRoot()">Calculate</button>
    <div id="result"></div>
</div>

<script>
    function calculateRoot() {
        let val = document.getElementById('numInput').value;
        if (!val) return;

        let n = Math.abs(parseInt(val));
        
        // The Math Magic: The Digital Root Formula
        // n % 9 gives the remainder, but if it's 0 and n > 0, the result is 9.
        let result = n === 0 ? 0 : 1 + ((n - 1) % 9);

        document.getElementById('result').innerText = "The result is: " + result;
    }
</script>

</body>
</html>
